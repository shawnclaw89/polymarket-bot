# ============================================================
# Kalshi Bot — Configuration
# ============================================================
paper_trading: false

telegram_to: "7591705971"
scan_interval: 300              # full scan every 5 minutes
scan_interval_arb: 30          # arb-only scan every 30s (unused — no arb strategies active)
max_alerts_per_scan: 5         # max Telegram messages per scan cycle
health_check_interval: 600     # check API health every 10 minutes

kalshi_api_host: "https://api.elections.kalshi.com/trade-api/v2"

api_key_id: "6936d363-c349-4f3e-b529-9035387deac5"
private_key_path: "kalshi_private_key.pem"

# ============================================================
# Strategies — only public_fade is active
# ============================================================
strategies:

  endgame_arb:
    enabled: false

  intramarket_arb:
    enabled: false

  momentum:
    enabled: false

  polymarket_tail:
    enabled: false

  agent_signal:
    enabled: false

  whale_follow:
    enabled: false

  public_fade:
    enabled: true
    description: "Fade the public on sports favorites, confirmed by Polymarket whale activity"
    # Kalshi YES price range indicating public overbetting (cents)
    min_yes_price: 63           # below this = not enough public lean to fade
    max_yes_price: 80           # above this = genuine lock, not public bias
    max_hours_to_close: 48      # game must be within 48h
    min_volume_24h: 1000        # need real liquidity
    # Whale confirmation (Polymarket)
    whale_lookback_hours: 6     # look back 6h for whale underdog activity
    min_whale_trade_usd: 200    # min whale trade size to count as confirmation
    min_whale_confirmations: 1  # at least 1 whale must be on underdog side
    # Execution
    max_position_usd: 200       # $200 per game
    max_strategy_exposure_usd: 1000  # hard cap — max 5 games open at once

# ============================================================
# Risk Management
# ============================================================
risk:
  max_open_positions: 5          # 5 games × $200 = $1,000 max
  max_total_exposure_usd: 1000
  stop_loss_pct: 100             # let each position resolve naturally (binary outcome)
  max_daily_loss_usd: 400        # hard stop at $400/day loss
