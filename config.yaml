# ============================================================
# Kalshi Bot — Configuration
# ============================================================
paper_trading: false

telegram_to: "7591705971"
scan_interval: 300              # full scan every 5 minutes
scan_interval_arb: 30          # arb-only scan every 30s (unused — no arb strategies active)
max_alerts_per_scan: 5         # max Telegram messages per scan cycle
health_check_interval: 600     # check API health every 10 minutes

kalshi_api_host: "https://api.elections.kalshi.com/trade-api/v2"

api_key_id: "6936d363-c349-4f3e-b529-9035387deac5"
private_key_path: "kalshi_private_key.pem"

# ============================================================
# Strategies — only public_fade is active
# ============================================================
strategies:

  endgame_arb:
    enabled: false

  intramarket_arb:
    enabled: false

  momentum:
    enabled: false

  polymarket_tail:
    enabled: false

  agent_signal:
    enabled: false

  whale_follow:
    enabled: false

  public_fade:
    enabled: true
    description: "Fade the public on sports favorites, confirmed by Polymarket whale activity"
    # Kalshi YES price range indicating public overbetting (cents)
    # Signal thresholds — if signal is there, just bet it
    min_public_pct: 65          # % of bets on public side to trigger
    min_divergence: 15          # min gap between bets% and money% — THE signal
    max_money_pct: 85           # skip only if sharp money also heavily with public
    max_hours_to_close: 168     # game must be within 7 days
    require_approval: false     # set true to queue trades for manual approval
    # Execution
    max_position_usd: 250       # $250 per game
    max_strategy_exposure_usd: 1250  # hard cap — max 5 games open at once

# ============================================================
# Risk Management
# ============================================================
risk:
  max_open_positions: 5          # 5 games × $250 = $1,250 max
  max_total_exposure_usd: 1250
  stop_loss_pct: 100             # let each position resolve naturally (binary outcome)
  max_daily_loss_usd: 500        # hard stop at $500/day loss
